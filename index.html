<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KABI Zeiterfassung</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #172434;
        background: #f4f7f9;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        max-width: 640px;
        padding: 48px;
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 40px;
      }

      p {
        margin: 0;
        color: #4b5b6f;
        font-size: 18px;
        line-height: 1.5;
      }

      .accent {
        color: #49a9bf;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World <span class="accent">KABI Zeiterfassung</span></h1>
      <p>Vercel ist verbunden. Der Projektstart steht.</p>
    </main>
  </body>
</html>
